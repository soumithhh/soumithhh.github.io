<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Optimization Framework</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        #toast {
            opacity: 0;
            transform: translateY(1rem) translateX(-50%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translateY(0) translateX(-50%);
        }

        .prompt-container {
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body class="antialiased text-slate-800 min-h-screen flex flex-col">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-6 h-6 text-blue-600"></i>
                    Prompt Showcase
                </h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        <div id="prompts-grid" class="flex flex-col gap-8">
            <!-- Focused on the requested prompt -->
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-2 z-50">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400"></i>
        <span class="text-sm font-medium">Copied to clipboard!</span>
    </div>

    <script>
        const promptData = [
            {
                title: "YouTube Thumbnail Optimizer",
                category: "Design & Creative",
                content: `# Objective\nCreate a significantly improved YouTube thumbnail using the attached image as the source concept, while preserving the original topic and using only the text already present in the image.\n\n# Instructions\n- Read and understand the existing thumbnail before creating the new version.\n- Preserve the original topic of the thumbnail.\n- Use only the text already present in the source image.\n- Do not add any new text.\n- Do not mix, rewrite, or replace the existing text with different wording.\n- If any text in the source image is unreadable or ambiguous, do not guess or invent wording; preserve only the visible text as faithfully as possible.\n- Improve the overall design quality, visual hierarchy, visibility, clickability, and professional polish.\n- Apply strong thumbnail design best practices to keep the composition clear, bold, and easy to understand at a glance.\n- Optimize for high click-through appeal.\n- Prefer concise, high-contrast composition over unnecessary detail so the thumbnail remains effective at small sizes.\n\n# Output Requirements\n- Return only the final thumbnail image.\n- The final result must be a YouTube thumbnail at exactly \`1920x1080\` resolution.\n- Maintain a strict \`16:9\` aspect ratio.\n\n# Verification\nBefore finalizing, verify that:\n- the thumbnail uses only existing text from the source image,\n- the design remains visually clear at small size,\n- the output meets the exact \`1920x1080\` resolution requirement, and\n- the output preserves the strict \`16:9\` aspect ratio.\n\n# Reasoning\nThink through the design improvements internally and do not introduce any wording not already visible in the source image.`
            }
        ];

        const gridContainer = document.getElementById('prompts-grid');
        const toast = document.getElementById('toast');
        let toastTimeout;

        function renderCards() {
            promptData.forEach((item) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all duration-300 hover:shadow-md";
                
                card.innerHTML = `
                    <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-blue-600 mb-1 block">${item.category}</span>
                            <h3 class="text-lg font-bold text-slate-900">${item.title}</h3>
                        </div>
                        <button 
                            onclick="copyToClipboard(this, \`${item.content.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)"
                            class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-slate-600 hover:text-blue-600 hover:border-blue-200 hover:bg-blue-50 transition-all font-medium text-sm shadow-sm active:scale-95"
                        >
                            <i data-lucide="copy" class="w-4 h-4 copy-icon"></i>
                            <i data-lucide="check" class="w-4 h-4 check-icon hidden text-emerald-500"></i>
                            <span>Copy Prompt</span>
                        </button>
                    </div>
                    <div class="p-6">
                        <div class="prompt-container bg-slate-900 rounded-xl p-6 overflow-x-auto">
                            <pre class="text-sm text-slate-300 whitespace-pre-wrap leading-relaxed font-mono">${item.content}</pre>
                        </div>
                    </div>
                `;
                
                gridContainer.appendChild(card);
            });
            lucide.createIcons();
        }

        function copyToClipboard(button, text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast();
                    toggleButtonIcon(button);
                }
            } catch (err) {
                console.error('Unable to copy', err);
            }
            document.body.removeChild(textArea);
        }

        function toggleButtonIcon(button) {
            const copyIcon = button.querySelector('.copy-icon');
            const checkIcon = button.querySelector('.check-icon');
            const btnText = button.querySelector('span');
            
            copyIcon.classList.add('hidden');
            checkIcon.classList.remove('hidden');
            btnText.innerText = "Copied!";
            
            setTimeout(() => {
                copyIcon.classList.remove('hidden');
                checkIcon.classList.add('hidden');
                btnText.innerText = "Copy Prompt";
            }, 2000);
        }

        function showToast() {
            clearTimeout(toastTimeout);
            toast.classList.add('show');
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', renderCards);
    </script>
</body>
</html>
